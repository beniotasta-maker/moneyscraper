services:
  - type: web
    name: trend-cashout-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_CURRENCY
        value: usd
      - key: APP_API_TOKEN
        sync: false
